services:
  prefect-server:
    image: prefecthq/prefect:3.7.8-python3.13
    environment:
      PREFECT_UI_URL: http://localhost:4201
      PREFECT_UI_API_URL: http://localhost:4201/api
    ports:
      - 4201:4200
    mem_limit: 512m
    restart: unless-stopped
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    command: prefect server start --host 0.0.0.0

  prefect-worker:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SUGRA_API_KEY: ${SUGRA_API_KEY}
      PREFECT_API_URL: http://prefect-server:4200/api
      RAVEN_DUCKDB: /home/raven/db/raven.duckdb

    volumes:
      - ./db:/home/raven/db
      - ./orchestration:/home/raven/orchestration
    depends_on:
      prefect-server:
        condition: service_healthy
    mem_limit: 512m
    restart: unless-stopped
    command: prefect worker start --pool raven-pool
